<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Open API Project</title>
    <link rel="stylesheet" href="css/index.css"/>
  </head>
  <body>
    <header>
      <h1>My Open API Project</h1>
    </header>
    <main>
      <!-- Description -->
      <section id="weather">
        <p>Input city name and check today's weather and 7-day forecast!</p>
      </section>
      <!-- Input section and current weather -->
      <section id="weatherInput">
        <input type="text" id="cityInput" placeholder="Enter city name"/>
        <button id="searchBtn">Search</button>
        <div id="weatherContainer">
          <div id="weatherIcon"></div>
          <pre id="weatherInfo"></pre>
        </div>
      </section>
      <!-- 7-day forecast section -->
      <section id="forecastTitle">
        <h2>7-Day Forecast</h2>
        <div id="forecast"></div>
      </section>
    </main>
    <script src="js/index.js"></script>
  </body>
</html>
